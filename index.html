<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle Dark Mode">🌙</button>
        <h1>Lotto Number Generator</h1>
        <button id="generate-btn">Generate Numbers</button>
        <div id="numbers-container"></div>
    </div>

    <div class="container" style="margin-top: 40px;">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xlgoopyo" method="POST" id="contact-form">
            <div class="form-group">
                <label for="name">성함/업체명</label>
                <input type="text" id="name" name="name" required placeholder="홍길동">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="제휴 관련 내용을 입력해주세요."></textarea>
            </div>
            <button type="submit" id="submit-btn">문의하기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
