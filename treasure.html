<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보물찾기 - 전설의 보물을 찾아서</title>
    <link rel="stylesheet" href="treasure.css">
</head>
<body>
    <div class="game-container">
        <header>
            <a href="index.html" class="back-link">← 메뉴 추천으로 돌아가기</a>
            <h1>🗺️ 전설의 보물찾기</h1>
        </header>

        <div id="setup-screen" class="screen">
            <h2>난이도를 선택하세요</h2>
            <div class="difficulty-options">
                <button class="diff-btn" data-level="easy">
                    <span class="level">쉬움</span>
                    <span class="desc">5x5 그리드 / 10턴</span>
                </button>
                <button class="diff-btn" data-level="hard">
                    <span class="level">어려움</span>
                    <span class="desc">8x8 그리드 / 15턴</span>
                </button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="game-info">
                <div class="info-item">
                    <span class="label">남은 턴</span>
                    <span id="turns-left" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">현재 점수</span>
                    <span id="current-score" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">최고 기록</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>

            <div id="treasure-grid" class="grid"></div>
            
            <button id="reset-btn">포기하고 다시 시작</button>
        </div>

        <div id="result-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="result-title">탐험 종료!</h2>
                <div class="result-stats">
                    <p>최종 점수: <span id="final-score">0</span></p>
                    <p id="new-record" class="hidden">🎉 새로운 기록입니다! 🎉</p>
                </div>
                <button id="modal-close-btn">다시 도전하기</button>
            </div>
        </div>
    </div>
    <script src="treasure.js"></script>
</body>
</html>
